<svg class="animate" width="630" height="200" viewBox="0 0 630 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .animate .p1  { animation: p1-draw  5s cubic-bezier(0.4,0,0.2,1) 0s infinite; }
    .animate .p2  { animation: p2-draw  5s cubic-bezier(0.4,0,0.2,1) 0s infinite; }
    .animate .p3  { animation: p3-draw  5s cubic-bezier(0.4,0,0.2,1) 0s infinite; }
    .animate .p4  { animation: p4-draw  5s cubic-bezier(0.4,0,0.2,1) 0s infinite; }
    .animate .p5  { animation: p5-draw  5s cubic-bezier(0.4,0,0.2,1) 0s infinite; }
    .animate .p6  { animation: p6-draw  5s cubic-bezier(0.4,0,0.2,1) 0s infinite; }
    .animate .p13 { animation: p13-draw 5s cubic-bezier(0.4,0,0.2,1) 0s infinite; }
